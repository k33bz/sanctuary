name: build

on:
  push:
    branches: [main, '26.*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
      - name: Build + tests
        run: ./gradlew build
      - name: Diagnose mappings (only on failure)
        if: failure()
        run: |
          J=$(find ~/.gradle/caches/fabric-loom -name "*minecraft*.jar" 2>/dev/null | grep -viE "sources|javadoc|intermediary" | head -1)
          echo "== $J"
          javap -cp "$J" net.minecraft.server.level.ServerLevel 2>/dev/null | grep -iE "spawn"
          echo "== ServerPlayer"
          javap -cp "$J" net.minecraft.server.level.ServerPlayer 2>/dev/null | grep -iE "spawn|teleport"
          echo "== LevelData"
          javap -cp "$J" net.minecraft.world.level.storage.LevelData 2>/dev/null | grep -iE "spawn"
          echo "== Level time"
          javap -cp "$J" net.minecraft.world.level.Level 2>/dev/null | grep -iE "time|night|day"
          javap -cp "$J" net.minecraft.world.level.storage.LevelData 2>/dev/null | grep -iE "time"
          echo "== GameRules location"
          unzip -l "$J" 2>/dev/null | grep -iE "gamerule" | grep -v Test | head -12
          echo "== Scoreboard"
          javap -cp "$J" net.minecraft.world.scores.Scoreboard 2>/dev/null | grep -iE "objective|score"
          echo "== Objective/ScoreAccess"
          javap -cp "$J" net.minecraft.world.scores.ScoreAccess 2>/dev/null
          javap -cp "$J" net.minecraft.world.scores.PlayerScoreEntry 2>/dev/null
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: sanctuary
          path: build/libs/*.jar
