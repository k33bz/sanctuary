name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
      - name: Build
        run: ./gradlew build
      - name: Create release with jar
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jar=$(ls build/libs/*.jar | grep -v sources | head -1)
          gh release create "${GITHUB_REF_NAME}" "$jar" \
            --title "Sanctuary ${GITHUB_REF_NAME#v}" \
            --generate-notes
